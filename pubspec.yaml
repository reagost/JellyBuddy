name: jelly_buddy
description: AI-powered gamified learning app with local LLM support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.0

  # File system
  path_provider: ^2.1.0

  # Dependency Injection
  get_it: ^7.6.4

  # JSON Serialization
  json_annotation: ^4.8.1

  # Animations
  flutter_animate: ^4.3.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.6

  # Local Notifications
  flutter_local_notifications: ^18.0.0

  # Timezone for notification scheduling
  timezone: ^0.10.0

  # Local LLM inference
  jelly_llm:
    path: packages/jelly_llm

  # File picker for course import
  file_picker: ^8.1.4

  # Secure storage for API keys
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  bloc_test: ^9.1.0
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/courses/
    - assets/legal/
    - assets/icon/
