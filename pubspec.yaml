name: jelly_buddy
description: AI-powered gamified learning app with local LLM support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.0
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.0

  # File system
  path_provider: ^2.1.0

  # Dependency Injection
  get_it: ^7.6.4

  # JSON Serialization
  json_annotation: ^4.8.1

  # Animations
  flutter_animate: ^4.3.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.6

  # Local LLM inference
  jelly_llm:
    path: packages/jelly_llm

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  bloc_test: ^9.1.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/courses/
